name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          IMAGE_SEMANTIC_RELEASE: ${{ vars.IMAGE_SEMANTIC_RELEASE }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_REF \
            -e GITHUB_REF_NAME \
            -e GITHUB_REPOSITORY \
            -e GITHUB_SHA \
            -e GITHUB_WORKSPACE \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            --entrypoint sh \
            "${IMAGE_SEMANTIC_RELEASE}" \
            -c 'git config --global --add safe.directory "${GITHUB_WORKSPACE}" && semantic-release --repository-url "https://github.com/${GITHUB_REPOSITORY}.git"'
